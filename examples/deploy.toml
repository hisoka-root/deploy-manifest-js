version = 1

[app]
name = "store"
description = "Ecommerce platform"
homepage = "https://example.com"
repository = "https://github.com/example/store"

[runtime]
type = "php"
version = "8.4"

[build]
strategy = "custom"
commands = ["composer install", "npm install", "npm run build"]

[build.variables]
NEXT_PUBLIC_API_URL = "https://api.example.com"

[build.variables.BUILD_SECRET]
secret = "build-env-key"

[start]
web = "php public/index.php"
worker = "php artisan queue:work"

[workers.queue]
command = "php artisan queue:work"
replicas = 3

[env]
APP_ENV = "production"

[env.DB_PASSWORD]
secret = "database-password"

[network]
port = 8080
domains = ["store.example.com"]
routes = ["/api/*"]

[[storage]]
name = "uploads"
mount = "/app/uploads"
size = "20GB"

[[storage]]
name = "cache"
mount = "/cache"
ephemeral = true

[services.database]
type = "postgres"
version = "17"

[services.redis]
type = "redis"
version = "7"

[health]
path = "/health"
interval = "30s"
timeout = "5s"

[scaling]
min = 2
max = 10
cpu_target = 80

[[cron]]
name = "cleanup"
schedule = "0 0 * * *"
command = "php artisan cleanup"
